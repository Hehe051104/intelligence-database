name: 🕵️ Intelligence Radar Cron Job

# 触发条件：定时触发 + 手动触发
on:
  schedule:
    # 每天北京时间早上 8:00 (UTC 0:00) 和 晚上 20:00 (UTC 12:00) 自动跑两次
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点按钮运行

jobs:
  run-radar-agent:
    runs-on: ubuntu-latest # 白嫖微软的一台最新版 Linux 服务器

    steps:
    - name: 📥 检出代码
      uses: actions/checkout@v4

    - name: 🐍 配置 Python 3.10 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 缓存依赖，加快下次运行速度

    - name: 📦 安装武器库 (依赖)
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser openai

    - name: 🚀 执行跨海特工脚本
      env:
        # 极客的安全底线：绝不把密码写在代码里，而是从 GitHub 环境变量读取
        ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        python radar-agent/radar_agent.py